<!DOCTYPE html>
<html lang="fr">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Calculator Synthwave 🖩</title>
   <link rel="stylesheet" href="styles/main.css">
   <link rel="stylesheet" href="styles/calculator.css">
   <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&display=swap"
      rel="stylesheet">
</head>

<body>
   <div class="app-container">
      <header class="app-header">
         <h1>🖩 CALCULATOR SYNTHWAVE</h1>
         <p class="subtitle">Une calculatrice rétro avec style</p>
         <p class="subtitle-en">A retro calculator with style</p>
      </header>

      <div class="calculator-container">
         <div class="calculator">
            <div class="display">
               <div class="previous-operand" id="previous-operand"></div>
               <div class="current-operand" id="current-operand">0</div>
            </div>

            <div class="buttons">
               <button class="btn operator" data-action="clear">C</button>
               <button class="btn operator" data-action="delete">⌫</button>
               <button class="btn operator" data-action="toggle-sign">+/-</button>
               <button class="btn operator" data-action="divide">/</button>

               <button class="btn number" data-number="7">7</button>
               <button class="btn number" data-number="8">8</button>
               <button class="btn number" data-number="9">9</button>
               <button class="btn operator" data-action="multiply">×</button>

               <button class="btn number" data-number="4">4</button>
               <button class="btn number" data-number="5">5</button>
               <button class="btn number" data-number="6">6</button>
               <button class="btn operator" data-action="subtract">-</button>

               <button class="btn number" data-number="1">1</button>
               <button class="btn number" data-number="2">2</button>
               <button class="btn number" data-number="3">3</button>
               <button class="btn operator" data-action="add">+</button>

               <button class="btn number zero" data-number="0">0</button>
               <button class="btn number" data-number=".">.</button>
               <button class="btn operator equals" data-action="calculate">=</button>
            </div>
         </div>

         <div class="history-container">
            <h3>📜 Historique / History</h3>
            <div class="history-list" id="history-list">
               <!-- L'historique sera affiché ici -->
            </div>
            <button id="clear-history-btn" class="neon-button">Effacer l'historique / Clear History</button>
         </div>

         <div class="theme-toggle">
            <button id="theme-btn" class="neon-button">🌓 Thème / Theme</button>
         </div>
      </div>
   </div>

   <script src="scripts/calculator.js"></script>
   <script src="scripts/history.js"></script>
   <script src="scripts/theme.js"></script>
   <script src="scripts/app.js"></script>
</body>

</html>
